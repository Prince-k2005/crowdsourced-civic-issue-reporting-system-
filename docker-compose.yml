version: '3.8'

services:
  # ── FastAPI Backend ──
  backend:
    build: ./backend
    container_name: civicflow_backend
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Next.js Frontend ──
  frontend:
    build: ./frontend
    container_name: civicflow_frontend
    ports:
      - "3000:3000"
    env_file: .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
